<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Price Sorter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        width: 280px;
        padding: 20px;
        background: #1a1a1a;
        color: #fff;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        text-align: center;
      }

      .status-container {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        background: #252525;
        border-radius: 8px;
        margin-bottom: 16px;
      }

      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ef4444;
        flex-shrink: 0;
      }

      .status-dot.active {
        background: #22c55e;
      }

      .status-info {
        flex: 1;
      }

      .status-text {
        font-weight: 500;
        font-size: 14px;
      }

      .site-name {
        font-size: 12px;
        color: #888;
        margin-top: 2px;
      }

      .footer-note {
        font-size: 11px;
        color: #666;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="popupTitle">Price Sorter</h1>

    <div id="allegro.pl" class="status-container">
      <span class="status-dot"></span>
      <div class="status-info">
        <div class="status-text" data-i18n="statusInactive">Inactive</div>
        <div class="site-name">Allegro</div>
      </div>
    </div>

    <div id="olx.pl" class="status-container">
      <span class="status-dot"></span>
      <div class="status-info">
        <div class="status-text" data-i18n="statusInactive">Inactive</div>
        <div class="site-name">Olx</div>
      </div>
    </div>

    <div class="footer-note" data-i18n="footerNote">
      Extension activates only when sorting by price is enabled
    </div>
    <script src="popup.js"></script>
  </body>
</html>
